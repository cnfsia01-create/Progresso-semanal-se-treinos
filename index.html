<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Semanal de Treinos</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9972B;
    --gold-light: #E8B84B;
    --gold-dim: #8a6420;
    --bg: #0d0d0d;
    --card: #141414;
    --card-hover: #1c1c1c;
    --border: #2a2a2a;
    --text: #e0d5c5;
    --muted: #6b6360;
    --done-bg: #0f1a0f;
    --done-border: #2a5a2a;
    --done-gold: #4a8a4a;
    --slot-border: #1e1e1e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 32px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header::after {
    content: '';
    display: block;
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 14px auto 0;
  }
  .header-label {
    font-size: 11px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(26px, 7vw, 40px);
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 40px rgba(201,151,43,0.15);
  }
  .header h1 span { color: var(--gold); }
  .subtitle {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Progress */
  .progress-wrap {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 24px;
    padding: 14px 18px;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-label {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .progress-count {
    font-family: 'Black Ops One', cursive;
    font-size: 18px;
    color: var(--gold);
  }
  .progress-bar-bg {
    height: 4px;
    background: #222;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold-light));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 10px rgba(201,151,43,0.4);
  }

  /* Hint */
  .drag-hint {
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0.7;
  }

  /* Slot list */
  .slot-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Each slot = one day row */
  .slot-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid var(--slot-border);
    transition: border-color 0.2s;
  }

  .slot-row.drag-over-slot {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold), 0 0 20px rgba(201,151,43,0.15);
  }

  /* Day label — FIXED */
  .day-label {
    width: 80px;
    min-width: 80px;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 8px;
    border-right: 2px solid var(--gold-dim);
    flex-shrink: 0;
  }

  .day-label .day-abbr {
    font-family: 'Black Ops One', cursive;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    line-height: 1;
  }

  .day-label .day-full {
    font-family: 'Rajdhani', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 3px;
  }

  .slot-row.done-slot .day-label {
    border-right-color: var(--done-gold);
  }
  .slot-row.done-slot .day-label .day-abbr {
    color: var(--done-gold);
    opacity: 0.7;
  }

  /* Workout pill — DRAGGABLE */
  .workout-pill {
    flex: 1;
    background: var(--card);
    display: flex;
    align-items: center;
    gap: 0;
    cursor: grab;
    transition: background 0.15s, box-shadow 0.15s, opacity 0.2s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .workout-pill::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,151,43,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .workout-pill:hover {
    background: var(--card-hover);
    box-shadow: inset 0 0 0 1px rgba(201,151,43,0.15);
  }

  .workout-pill:active { cursor: grabbing; }

  .workout-pill.dragging {
    opacity: 0.35;
  }

  .workout-pill.rest-pill {
    opacity: 0.75;
  }

  /* done state */
  .slot-row.done-slot .workout-pill {
    background: var(--done-bg);
  }
  .slot-row.done-slot .workout-title {
    text-decoration: line-through;
    text-decoration-color: var(--done-gold);
    opacity: 0.6;
  }
  .slot-row.done-slot .workout-icon {
    filter: grayscale(0.6);
  }

  /* drag handle inside pill */
  .pill-handle {
    padding: 0 10px;
    color: var(--muted);
    opacity: 0.3;
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .workout-pill:hover .pill-handle { opacity: 0.7; }

  .pill-handle span {
    display: block;
    width: 12px;
    height: 1.5px;
    background: currentColor;
    border-radius: 1px;
  }

  .workout-icon {
    width: 38px;
    height: 38px;
    background: rgba(201,151,43,0.07);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
    margin: 13px 12px 13px 2px;
  }

  .workout-info {
    flex: 1;
    padding: 13px 0;
    min-width: 0;
  }

  .workout-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.1;
  }

  .workout-tags {
    margin-top: 4px;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 9px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    border: 1px solid #2a2a2a;
    padding: 2px 5px;
    border-radius: 1px;
  }

  /* Checkbox */
  .check-wrap {
    padding: 13px 14px 13px 6px;
    flex-shrink: 0;
  }
  .check-btn {
    width: 26px;
    height: 26px;
    border: 2px solid var(--gold-dim);
    background: transparent;
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .check-btn:hover {
    border-color: var(--gold);
    background: rgba(201,151,43,0.08);
  }
  .check-btn.checked {
    background: var(--done-gold);
    border-color: var(--done-gold);
  }
  .check-btn svg {
    opacity: 0;
    transform: scale(0.4);
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .check-btn.checked svg {
    opacity: 1;
    transform: scale(1);
  }
  .rest-pill ~ .check-wrap { display: none; }

  /* Actions */
  .actions {
    margin-top: 22px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .btn {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
  }
  .btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  /* Banner */
  .banner {
    display: none;
    text-align: center;
    margin-top: 20px;
    padding: 16px;
    border: 1px solid var(--gold-dim);
    background: rgba(201,151,43,0.05);
  }
  .banner.show { display: block; }
  .banner.celebrate {
    animation: bannerPulse 0.6s ease;
  }
  @keyframes bannerPulse {
    0% { transform: scale(0.9); opacity: 0; }
    60% { transform: scale(1.03); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Confetti */
  .confetti-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    top: -10px;
    width: 8px;
    height: 14px;
    opacity: 0.9;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% {
      transform: translateY(0) translateX(0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(110vh) translateX(var(--drift)) rotate(var(--spin));
      opacity: 0.3;
    }
  }
  .banner p {
    font-family: 'Black Ops One', cursive;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  /* Entry animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .slot-list li { animation: slideIn 0.3s ease both; }
  .slot-list li:nth-child(1) { animation-delay: 0.04s; }
  .slot-list li:nth-child(2) { animation-delay: 0.08s; }
  .slot-list li:nth-child(3) { animation-delay: 0.12s; }
  .slot-list li:nth-child(4) { animation-delay: 0.16s; }
  .slot-list li:nth-child(5) { animation-delay: 0.20s; }
  .slot-list li:nth-child(6) { animation-delay: 0.24s; }
  .slot-list li:nth-child(7) { animation-delay: 0.28s; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-label">Semana de Treino</div>
    <h1>Semanal <span>Plan</span></h1>
    <div class="subtitle">Técnica · Força · Domínio</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-label">Progresso da Semana</span>
      <span class="progress-count" id="progressCount">0 / 6</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div class="drag-hint">⇄ Arraste o treino entre os dias para realocar</div>

  <ul class="slot-list" id="slotList"></ul>

  <div class="actions">
    <button class="btn" onclick="resetChecks()">↺ Resetar Semana</button>
    <button class="btn" onclick="resetAssignment()">⇄ Restaurar Treinos</button>
  </div>

  <div class="banner" id="banner">
    <p>🔥 Semana Completa. Descanse. Cresça.</p>
  </div>

  <div class="confetti-layer" id="confettiLayer"></div>

</div>

<script>
// DAYS — always fixed, never move
const DAYS = [
  { id: 'seg', abbr: 'SEG', full: 'Segunda' },
  { id: 'ter', abbr: 'TER', full: 'Terça'   },
  { id: 'qua', abbr: 'QUA', full: 'Quarta'  },
  { id: 'qui', abbr: 'QUI', full: 'Quinta'  },
  { id: 'sex', abbr: 'SEX', full: 'Sexta'   },
  { id: 'sab', abbr: 'SÁB', full: 'Sábado'  },
  { id: 'dom', abbr: 'DOM', full: 'Domingo' },
];

// WORKOUTS — the content that moves between days
const WORKOUTS = {
  mma1:   { title: 'MMA',                    tags: ['Técnica','Força','Intensidade'],              icon: '🥊', rest: false },
  cali_u: { title: 'Calistenia Upper',        tags: ['Controle','Força','Foco'],                   icon: '💪', rest: false },
  mma2:   { title: 'MMA',                    tags: ['Movimento','Estratégia','Domínio'],            icon: '🥊', rest: false },
  cali_l: { title: 'Calistenia Lower',        tags: ['Equilíbrio','Mobilidade','Força Real'],       icon: '🏋️', rest: false },
  cond1:  { title: 'Condicionamento Operacional', tags: ['Resistência','Explosão','Mente Inquebrável'], icon: '⚡', rest: false },
  rest:   { title: 'Descanso',               tags: ['Recupere-se','Cresça','Volte Mais Forte'],    icon: '🧘', rest: true  },
  cond2:  { title: 'Condicionamento Operacional', tags: ['Resistência','Explosão','Mente Inquebrável'], icon: '🔥', rest: false },
};

const DEFAULT_ASSIGNMENT = {
  seg: 'mma1',
  ter: 'cali_u',
  qua: 'mma2',
  qui: 'cali_l',
  sex: 'cond1',
  sab: 'rest',
  dom: 'cond2',
};

// State: assignment[dayId] = workoutKey
let assignment = loadAssignment();
let checked    = loadChecked();   // checked[dayId] = bool

function loadAssignment() {
  try {
    const s = localStorage.getItem('wk_assignment_v2');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { ...DEFAULT_ASSIGNMENT };
}

function loadChecked() {
  try {
    const s = localStorage.getItem('wk_checked_v2');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return {};
}

function saveAssignment() {
  try { localStorage.setItem('wk_assignment_v2', JSON.stringify(assignment)); } catch(e) {}
}

function saveChecked() {
  try { localStorage.setItem('wk_checked_v2', JSON.stringify(checked)); } catch(e) {}
}

// SVG icons for specific exercises (pose-accurate, stroke style matching gold theme)
const SVG_ICONS = {
  SVG_PULLUP: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9972B" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="4" x2="20" y2="4"/>
    <circle cx="12" cy="8.2" r="1.6" fill="#C9972B" stroke="none"/>
    <path d="M8.5 4.5 L10.3 9 L12 11 L13.7 9 L15.5 4.5"/>
    <path d="M12 11 L10.8 16 L9.7 20"/>
    <path d="M12 11 L13.2 16 L14.3 20"/>
  </svg>`,
  SVG_PISTOL: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9972B" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="13.5" cy="4.5" r="1.6" fill="#C9972B" stroke="none"/>
    <path d="M13.5 6.2 L12.5 11 L9 13.5"/>
    <path d="M12.5 11 L15.5 13"/>
    <path d="M9 13.5 L4.5 12.5"/>
    <path d="M9 13.5 L10 18 L9 21"/>
    <path d="M9 13.5 L14.5 15.5 L19.5 14.5"/>
  </svg>`
};

function renderIcon(icon) {
  return SVG_ICONS[icon] ? SVG_ICONS[icon] : icon;
}

// ── Render ──────────────────────────────────────────────
function render() {
  const list = document.getElementById('slotList');
  list.innerHTML = '';

  DAYS.forEach(day => {
    const wKey = assignment[day.id];
    const w    = WORKOUTS[wKey];
    const isDone = !!checked[day.id] && !w.rest;

    const li = document.createElement('li');

    li.innerHTML = `
      <div class="slot-row${isDone ? ' done-slot' : ''}" data-day="${day.id}">

        <!-- Fixed day label -->
        <div class="day-label">
          <span class="day-abbr">${day.abbr}</span>
          <span class="day-full">${day.full}</span>
        </div>

        <!-- Draggable workout pill -->
        <div class="workout-pill${w.rest ? ' rest-pill' : ''}"
             draggable="true"
             data-day="${day.id}">
          <div class="pill-handle">
            <span></span><span></span><span></span>
          </div>
          <div class="workout-icon">${renderIcon(w.icon)}</div>
          <div class="workout-info">
            <div class="workout-title">${w.title}</div>
            <div class="workout-tags">
              ${w.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        </div>

        <!-- Checkbox (outside pill, fixed to slot) -->
        ${!w.rest ? `
        <div class="check-wrap">
          <button class="check-btn${isDone ? ' checked' : ''}"
                  data-day="${day.id}">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <path d="M1 5L4.5 8.5L11 1.5" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>` : ''}

      </div>
    `;

    // Checkbox click
    const btn = li.querySelector('.check-btn');
    if (btn) btn.addEventListener('click', () => toggleCheck(day.id));

    // Drag events on pill
    const pill = li.querySelector('.workout-pill');
    pill.addEventListener('dragstart', onDragStart);
      pill.addEventListener('dragend',   onDragEnd);

    // Drop target is the entire slot-row
    const row = li.querySelector('.slot-row');
    row.addEventListener('dragover',  onDragOver);
    row.addEventListener('dragleave', onDragLeave);
    row.addEventListener('drop',      onDrop);

    list.appendChild(li);
  });

  updateProgress();
}

// ── Confetti ─────────────────────────────────────────────
let wasComplete = false;
const CONFETTI_COLORS = ['#C9972B', '#E8B84B', '#8a6420', '#fff', '#4a8a4a'];

function launchConfetti() {
  const layer = document.getElementById('confettiLayer');
  const count = 70;

  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    const left = Math.random() * 100;
    const duration = 2.2 + Math.random() * 1.6;
    const delay = Math.random() * 0.4;
    const drift = (Math.random() * 160 - 80) + 'px';
    const spin = (Math.random() * 720 - 360) + 'deg';

    piece.style.left = left + 'vw';
    piece.style.background = color;
    piece.style.animationDuration = duration + 's';
    piece.style.animationDelay = delay + 's';
    piece.style.setProperty('--drift', drift);
    piece.style.setProperty('--spin', spin);

    // Randomize shape: some squares, some round
    if (Math.random() > 0.5) piece.style.borderRadius = '50%';

    layer.appendChild(piece);

    setTimeout(() => piece.remove(), (duration + delay) * 1000 + 200);
  }
}


function toggleCheck(dayId) {
  const wKey = assignment[dayId];
  if (WORKOUTS[wKey].rest) return;
  checked[dayId] = !checked[dayId];
  saveChecked();
  render();
}

// ── Progress ────────────────────────────────────────────
function updateProgress() {
  const trainDays = DAYS.filter(d => !WORKOUTS[assignment[d.id]].rest);
  const done  = trainDays.filter(d => checked[d.id]).length;
  const total = trainDays.length;
  const pct   = total > 0 ? (done / total) * 100 : 0;

  document.getElementById('progressCount').textContent = `${done} / ${total}`;
  document.getElementById('progressBar').style.width = pct + '%';

  const isComplete = done === total && total > 0;
  const banner = document.getElementById('banner');
  banner.classList.toggle('show', isComplete);

  if (isComplete && !wasComplete) {
    banner.classList.remove('celebrate');
    requestAnimationFrame(() => banner.classList.add('celebrate'));
    launchConfetti();
  }
  wasComplete = isComplete;
}

// ── Drag & Drop ──────────────────────────────────────────
let dragSrcDay = null;   // dayId where drag started

function onDragStart(e) {
  dragSrcDay = e.currentTarget.dataset.day;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over-slot').forEach(el => el.classList.remove('drag-over-slot'));
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  if (row.dataset.day !== dragSrcDay) {
    row.classList.add('drag-over-slot');
  }
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-slot');
}

function onDrop(e) {
  e.preventDefault();
  const targetRow = e.currentTarget;
  targetRow.classList.remove('drag-over-slot');

  const targetDay = targetRow.dataset.day;
  if (!dragSrcDay || targetDay === dragSrcDay) return;

  // Swap the workout assignments between the two days
  [assignment[dragSrcDay], assignment[targetDay]] =
  [assignment[targetDay],  assignment[dragSrcDay]];

  // Also swap checked state so the tick follows the workout
  [checked[dragSrcDay], checked[targetDay]] =
  [checked[targetDay],  checked[dragSrcDay]];

  saveAssignment();
  saveChecked();
  dragSrcDay = null;
  render();
}

// ── Reset ────────────────────────────────────────────────
function resetChecks() {
  checked = {};
  saveChecked();
  render();
}

function resetAssignment() {
  assignment = { ...DEFAULT_ASSIGNMENT };
  checked    = {};
  saveAssignment();
  saveChecked();
  render();
}

// Avoid firing confetti on initial page load if week is already complete
(function initCompletionState() {
  const trainDays = DAYS.filter(d => !WORKOUTS[assignment[d.id]].rest);
  const done = trainDays.filter(d => checked[d.id]).length;
  wasComplete = done === trainDays.length && trainDays.length > 0;
})();

render();
</script>
</body>
